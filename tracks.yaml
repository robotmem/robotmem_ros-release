      -i :{release_inc} --os-name ubuntu
    - git-bloom-generate -y rosdebian --prefix release/:{ros_distro} :{ros_distro}
      -i :{release_inc} --os-name debian --os-not-required
    devel_branch: main
    last_version: 0.1.0
    name: robotmem_ros
    patches: null
    release_inc: '0'
    release_repo_url: https://github.com/robotmem/robotmem_ros-release.git
    release_tag: :{version}
    ros_distro: jazzy
    vcs_type: git
    vcs_uri: https://github.com/robotmem/robotmem_ros.git
    version: :{auto}
